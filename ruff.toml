# https://github.com/pypa/hatch/blob/master/ruff_defaults.toml
extend = "ruff_defaults.toml"

target-version = "py312"

# https://github.com/astral-sh/ruff/issues/8627
exclude = [".git", ".mypy_cache", ".ruff_cache", ".venv", ".direnv",
    ".bzr",
    ".direnv",
    ".eggs",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

extend-include = ["*.ipynb"]

[format]
preview = true

[lint]
preview = true
extend-select = ["D"]

[lint.per-file-ignores]
"*" = ["T201"]
"dawacotools/*.py" = [
    # Explicit legacy package-wide baseline. Keep CI pointed at dawacotools, and
    # remove these codes incrementally as modules are modernized.
    "ARG001",
    "ARG005",
    "B905",
    "D103",
    "D205",
    "D401",
    "D414",
    "DTZ001",
    "FBT001",
    "FBT002",
    "ICN002",
    "N806",
    "PLC0415",
    "PLR1704",
    "PLR2004",
    "PLW0603",
    "PT018",
    "S101",
    "S608",
    "SIM108",
]
"tests/**/*.py" = [
    "D",
    "PLR2004",
    "S101",
]

[lint.pydocstyle]
convention = "numpy"