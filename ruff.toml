# https://github.com/pypa/hatch/blob/master/ruff_defaults.toml
extend = "ruff_defaults.toml"

target-version = "py312"

# https://github.com/astral-sh/ruff/issues/8627
exclude = [".git", ".mypy_cache", ".ruff_cache", ".venv", ".direnv",
    ".bzr",
    ".direnv",
    ".eggs",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

extend-include = ["*.ipynb"]

[format]
preview = true

[lint]
preview = true
extend-select = ["D"]

[lint.per-file-ignores]
"*" = ["T201"]
"dawacotools/*.py" = [
    # Remaining package modernization baseline: public API boolean parameters,
    # legacy assertions/docstrings, dynamic SQL table composition, and magic
    # domain constants. Keep package-wide linting enabled and shrink this list
    # as modules are modernized.
    "D103",
    "D205",
    "D414",
    "FBT001",
    "FBT002",
    "PLR2004",
    "PLW0603",
    "PT018",
    "S101",
    "S608",
]
"tests/**/*.py" = [
    "D",
    "PLR2004",
    "S101",
]

[lint.pydocstyle]
convention = "numpy"